name: linkcheck

on:
  schedule:
    - cron: '0 9 * * 1'   # Mondays 09:00 UTC
  pull_request:
    paths:
      - 'entries/**'
      - 'tools/linkcheck.py'
  workflow_dispatch:

jobs:
  linkcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install -r tools/requirements.txt
      - name: Run link checker
        run: python tools/linkcheck.py
