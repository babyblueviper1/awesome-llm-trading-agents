name: validate

on:
  pull_request:
    paths:
      - 'entries/**'
      - 'tools/**'
      - 'README.md'
      - '.github/workflows/validate.yml'
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install -r tools/requirements.txt
      - name: Validate entries
        run: python tools/validate_entries.py
      - name: Check README is up to date
        run: python tools/build_readme.py --check
