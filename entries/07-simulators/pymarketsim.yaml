maintainer: Strategic Reasoning Group (University of Michigan)
year: 2024
venue: ACM ICAIF 2024
description: >-
  Agent-based financial-market simulation environment for training and evaluating trading
  agents with deep RL. Models private valuations, asymmetric information, and a flexible limit
  order book; supports both single-agent and multi-agent RL settings.
note: >-
  Newer alternative / complement to ABIDES with a stronger emphasis on game-theoretic
  equilibria across populations of learned agents. Mostly used by the RL trading community
  today — wiring LLM agents into PyMarketSim is an open opportunity worth doing right.
