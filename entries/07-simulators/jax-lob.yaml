year: 2023
venue: ACM ICAIF 2023
description: >-
  GPU-accelerated limit-order-book simulator implemented in JAX, designed to unlock large-scale
  reinforcement learning for trading by running many parallel LOB simulations efficiently on
  modern hardware.
note: >-
  Right tool when training-loop throughput is the bottleneck and you accept JAX as a dependency.
  Less mature ecosystem than ABIDES; pick JAX-LOB for the RL throughput win, pick ABIDES for
  the richer agent-population modelling. Verify against your own setup — GPU-LOB performance
  claims are highly dependent on agent count and event density.
