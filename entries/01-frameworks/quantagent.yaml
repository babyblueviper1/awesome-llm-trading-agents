description: >-
  Multi-agent LLM framework targeting high-frequency trading, decomposing the task across four
  specialised agents — Indicator, Pattern, Trend, and Risk — that reason over generated chart images,
  so a vision-capable LLM is required.
note: >-
  Distinct from TradingAgents in its HFT framing and in being explicitly chart-image-driven. As with any
  HFT-flavoured LLM agent, readers should pay close attention to claimed bar resolution vs. realistic
  inference latency: visual-input LLMs are slow relative to HFT decision horizons, so the framework is
  better read as a research prototype than a deployable HFT stack.
