description: >-
  Conversational extension of FinQA — 3,037 training, 421 dev, 434 test multi-turn dialogue
  examples requiring chains of numerical reasoning over financial reports across conversation
  turns rather than single-shot.
note: >-
  Probes the same skill as FinQA in the more realistic *conversational* setting that LLM agents
  actually face. As with FinQA, top scores here are necessary but not sufficient for trading
  skill.
