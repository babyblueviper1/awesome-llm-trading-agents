authors:
  - Zhiyu Chen
  - et al.
year: 2021
venue: EMNLP 2021
description: >-
  Large-scale expert-annotated QA dataset over S&P 500 earnings reports — 8,281 QA pairs
  requiring numerical reasoning that combines tabular and unstructured-text evidence, with
  fully-annotated gold reasoning programs for explainability.
note: >-
  The canonical financial numerical-reasoning benchmark. Strong FinQA performance is a
  prerequisite, not a substitute, for trading skill — a model that cannot read a 10-K
  numerically cannot reason about fundamentals, but reading a 10-K numerically does not imply
  trading edge.
