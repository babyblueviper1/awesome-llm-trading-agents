description: >-
  Single LLM trading agent with three modules — character profiling, a layered memory with decay
  to model differing temporal sensitivities of financial signals, and a decision module — designed
  to mirror the cognitive structure of human discretionary traders.
note: >-
  Foundational reference for memory-aware LLM traders and the conceptual ancestor of TradingAgents
  and FinCon. The paper reports strong returns vs. algorithmic baselines on a scoped stock-trading
  task; readers should note the universe and time window are limited, and like all 2023-vintage LLM
  trading work the evaluation window risks overlap with the backbone LLM's training data.
