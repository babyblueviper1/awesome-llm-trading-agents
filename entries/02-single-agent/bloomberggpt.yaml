description: >-
  50B-parameter language model trained on 363B tokens of Bloomberg financial data plus 345B
  tokens of general-purpose text — the first widely-cited large financial LLM. The model itself
  is not released; the paper documents the training mix, architecture, and benchmark results.
note: >-
  Historical landmark but closed-weight. Reproduction is impossible without Bloomberg-internal
  data, which is precisely the gap that the FinGPT / FinMA / Fin-R1 lineage of open-weight
  FinLLMs was built to close. Cite for context; for actual use in your LLM agent, prefer an
  open-weight model.
