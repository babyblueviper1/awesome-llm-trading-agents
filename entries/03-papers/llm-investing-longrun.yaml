url: https://arxiv.org/abs/2505.07078
paper_url: https://arxiv.org/abs/2505.07078
year: 2025
venue: arXiv preprint
description: >-
  Empirical study testing whether LLM-driven investment strategies sustain returns over long
  evaluation windows — the regime where transaction costs, regime change, and overfitting most
  often kill backtest-only strategies.
note: >-
  Useful complement to the look-ahead-bias literature: even if you control for training-cutoff
  bleed, long-run live (or long-window walk-forward) performance is where most LLM strategies
  reveal their fragility. Read together with López de Prado's *Probability of Backtest Overfitting*.
