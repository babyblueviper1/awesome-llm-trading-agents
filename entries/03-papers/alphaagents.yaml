description: >-
  Multi-agent LLM framework for equity portfolio construction that orchestrates specialised agents
  reasoning over market data and fundamentals via collaborative debate, rather than a single agent
  with a long context.
note: >-
  Targets *portfolio construction* — a separate problem from single-stock timing and one where the
  literature has historically been thinner. Compares to standard portfolio baselines; the readability
  of the debate transcripts is one of the contribution claims and is worth inspecting directly.
