year: 2023
venue: NeurIPS 2023
description: >-
  General-purpose LLM-agent framework where the agent reflects verbally on task feedback and
  maintains an episodic memory of those reflections instead of updating weights. The
  conceptual ancestor of "verbal reinforcement" components in FinCon and other multi-agent
  trading systems.
note: >-
  Not finance-specific, but foundational for the multi-agent trading lineage. If you read one
  *general agent* paper before reading the finance-specific multi-agent work on this list,
  read Reflexion — it is what FinCon and several others build on when they call their feedback
  mechanism "verbal reinforcement".
