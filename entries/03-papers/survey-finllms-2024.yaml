description: >-
  Survey covering the history of FinLLMs from pre-trained LMs through GPT-series and selected
  open-source FinLLMs, comparing five technical approaches and summarising six benchmark tasks
  and datasets.
note: >-
  Complementary to the other two LLM-in-finance surveys on this list. Strongest contribution is
  the chronological-techniques framing, which is helpful for placing newer entries (Fin-R1,
  Fino1, DianJin-R1) in context.
