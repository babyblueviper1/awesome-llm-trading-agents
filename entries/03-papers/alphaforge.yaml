paper_url: https://arxiv.org/abs/2406.18394
year: 2024
venue: AAAI 2025
description: >-
  Two-stage formulaic-alpha framework — a generative-predictive neural network mines candidate
  factors, then a combination model dynamically reweights them based on recent temporal
  performance rather than using fixed weights.
note: >-
  Not an LLM trading agent, but cited frequently by LLM-alpha-mining work and worth knowing as
  the contemporary baseline in the formulaic-alpha lineage. Open implementation available at
  github.com/DulyHao/AlphaForge.
