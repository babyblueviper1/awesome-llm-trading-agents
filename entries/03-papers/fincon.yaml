description: >-
  Multi-agent LLM framework organised as a manager-analyst hierarchy with a risk-control component
  that triggers episodic self-critique; "conceptualised beliefs" extracted from past episodes serve
  as verbal reinforcement that is selectively propagated to the agent(s) needing knowledge updates.
note: >-
  From the same research lineage as FinMem; sharpens the multi-agent story with explicit belief
  conceptualisation and selective propagation, which is one of the cleaner mechanisms in the
  literature for avoiding catastrophic forgetting in long-horizon LLM trading runs. As always
  with single-paper trading evals, check the holdout window vs. backbone LLM training cutoff.
