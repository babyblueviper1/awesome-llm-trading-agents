paper_url: https://arxiv.org/abs/2512.06607
year: 2025
venue: arXiv preprint
description: >-
  Companion to the look-ahead-bias test paper — proposes a practical method for mitigating
  look-ahead bias when using pre-trained LLMs in financial backtests without prohibitively expensive
  re-training of frontier models from scratch.
note: >-
  Complementary to 2512.23847. If you build an LLM trading agent, you need a defensible answer to
  "why isn't this just memorising 2022–2024 returns?". This paper gives you one practical answer
  and a vocabulary to discuss it.
