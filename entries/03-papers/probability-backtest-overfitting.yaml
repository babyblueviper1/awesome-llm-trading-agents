year: 2014
venue: Journal of Computational Finance
description: >-
  Foundational paper formalising "backtest overfitting" — when, in an exhaustive search over
  trading-strategy variants, the in-sample "best" strategy almost certainly performs poorly
  out-of-sample. Introduces the Probability of Backtest Overfitting (PBO) statistic.
note: >-
  Pre-LLM but absolutely essential. Every "I tried N variants of my LLM-agent prompt and reported
  the best Sharpe" workflow is exactly what this paper warns against. If you read one methodology
  paper before evaluating any project on this list, read this one.
