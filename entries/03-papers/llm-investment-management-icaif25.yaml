description: >-
  Survey-and-frontiers paper on LLM agents specifically for investment management — portfolio
  optimisation, risk management, information retrieval, and automated strategy generation.
  Reviews emerging evaluation frameworks and identifies open challenges for real-world deployment.
note: >-
  Bridges the survey literature (broad LLM-in-finance) and the LLM-agent literature (broad
  agent capabilities). Useful for the "research frontiers" framing — explicitly enumerates
  what is *not yet* solved (robustness, explainability, deployment), which is hard to extract
  from the more enthusiastic technique-survey papers.
