year: 2014
venue: Journal of Portfolio Management
description: >-
  Introduces the Deflated Sharpe Ratio (DSR), which adjusts the conventional Sharpe ratio for
  the number of trials performed during strategy selection and for non-normal return distributions —
  separating likely-real edges from artifacts of multiple testing.
note: >-
  The companion to *The Probability of Backtest Overfitting*. If a paper or repo on this list
  reports a Sharpe of 2 without telling you how many variants were tried before reporting it,
  the unadjusted Sharpe is almost meaningless. Insist on DSR (or at minimum, the trial count).
